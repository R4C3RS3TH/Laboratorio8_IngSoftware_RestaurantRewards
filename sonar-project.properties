sonar.sources=.
sonar.exclusions=.venv/**, **/tests/**, .scannerwork/**
sonar.host.url=https://sonarqube.ingsoftware.lat/
# sonar.token is passed via SONAR_TOKEN environment variable (never hardcode secrets here)
# Run: SONAR_TOKEN=<your_token> sonar-scanner
sonar.tests=.
sonar.test.inclusions=**/tests/**, **test_*.py
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.10
